{% extends "base.html" %}

{% block title %}Consulta DNI/RUC{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/consulta_dni.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <h1>Consulta DNI o RUC</h1>
    <form id="consultaForm">
        <div class="form-group">
            <label for="tipo">Tipo de documento:</label>
            <select id="tipo" name="tipo">
                <option value="dni">DNI</option>
                <option value="ruc">RUC</option>
            </select>
        </div>
        <div class="form-group">
            <label for="numero">Número:</label>
            <input type="text" id="numero" name="numero" placeholder="Ingrese el número" required>
        </div>
        <button type="submit">Consultar</button>
    </form>
    <div id="resultado"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('consultaForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const tipo = document.getElementById('tipo').value;
    const numero = document.getElementById('numero').value.trim();
    const resultadoDiv = document.getElementById('resultado');

    // Validación
    if (tipo === 'dni' && numero.length !== 8) {
        resultadoDiv.innerHTML = '<p class="error">El DNI debe tener 8 dígitos.</p>';
        return;
    }
    if (tipo === 'ruc' && numero.length !== 11) {
        resultadoDiv.innerHTML = '<p class="error">El RUC debe tener 11 dígitos.</p>';
        return;
    }
    if (!/^\d+$/.test(numero)) {
        resultadoDiv.innerHTML = '<p class="error">El número debe contener solo dígitos.</p>';
        return;
    }

    // Construir URL
    const token = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJlbWFpbCI6ImkyNTEyNTU0QGNvbnRpbmVudGFsLmVkdS5wZSJ9.atmlR91JznkCYGLaL5wQg7BW1vYo6aMC5YIkHg40-Zo'; // Reemplaza con tu token real
    const url = `https://dniruc.apisperu.com/api/v1/${tipo}/${numero}?token=${token}`;

    // Fetch
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                resultadoDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } else {
                resultadoDiv.innerHTML = '<p class="error">Error en la consulta: ' + (data.message || 'Desconocido') + '</p>';
            }
        })
        .catch(error => {
            resultadoDiv.innerHTML = '<p class="error">Error de conexión: ' + error.message + '</p>';
        });
});
</script>
{% endblock %}
